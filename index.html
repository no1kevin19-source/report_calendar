<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>수행평가 캘린더 MVP</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css?v=deploy-ready">
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <nav class="topbar" aria-label="앱 상단 메뉴">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">D</span>
          <span>
            <strong>디데이 캘린더</strong>
            <small>수행평가를 날짜에 등록하고 클릭해서 확인해요</small>
          </span>
        </div>

      </nav>
    </header>

    <section class="reminder-panel" aria-labelledby="reminderTitle">
      <div class="reminder-copy">
        <p class="eyebrow">알림 설정</p>
        <h2 id="reminderTitle">다가오는 수행평가 알림</h2>
        <p>다가오는 수행평가를 확인하기 위한 알림 기준을 저장해둘 수 있어요.</p>
      </div>

      <div class="reminder-controls">
        <label>
          며칠 전 알림
          <select id="reminderDaysInput">
            <option value="0">마감일</option>
            <option value="1" selected>1일 전</option>
            <option value="2">2일 전</option>
            <option value="3">3일 전</option>
            <option value="5">5일 전</option>
            <option value="7">7일 전</option>
          </select>
        </label>

        <label>
          알림 시간
          <input id="reminderTimeInput" type="time" value="08:00">
        </label>

        <div class="reminder-actions">
          <button class="primary-button" id="saveReminderButton" type="button">알림 설정 저장</button>
          <button class="secondary-button" id="cancelReminderButton" type="button">알림 취소</button>
        </div>
      </div>

      <p class="reminder-status" id="reminderStatus" aria-live="polite"></p>
    </section>

    <main class="layout">
      <section class="panel form-panel" aria-labelledby="formTitle">
        <div class="panel-head">
          <div>
            <p class="eyebrow">새 기록</p>
            <h2 id="formTitle">수행평가 추가</h2>
          </div>
          <span class="pill">사진 첨부 가능</span>
        </div>

        <form id="assignmentForm" class="assignment-form" autocomplete="off">
          <input type="hidden" id="assignmentId">

          <label>
            과제명
            <input id="titleInput" type="text" autocomplete="off" required maxlength="40">
          </label>

          <label>
            과목
            <select id="subjectInput" required>
              <option value="">선택</option>
              <option>국어</option>
              <option>영어</option>
              <option>수학</option>
              <option>과학</option>
              <option>사회</option>
              <option>역사</option>
              <option>기술가정</option>
              <option>예체능</option>
              <option>직접 입력</option>
            </select>
          </label>

          <label id="customSubjectLabel" hidden>
            직접 입력 과목
            <input id="customSubjectInput" type="text" autocomplete="off" maxlength="20">
          </label>

          <label>
            마감일
            <input id="dueInput" type="date" required>
          </label>

          <label>
            교시
            <select id="periodInput" required>
              <option value="">선택</option>
              <option>1교시</option>
              <option>2교시</option>
              <option>3교시</option>
              <option>4교시</option>
              <option>5교시</option>
              <option>6교시</option>
              <option>7교시</option>
            </select>
          </label>

          <label>
            세부내용
            <textarea id="detailInput" autocomplete="off" rows="5" maxlength="300"></textarea>
          </label>

          <label class="photo-uploader">
            <span>
              사진 업로드
              <small>안내문, 칠판 사진, 수행평가 종이 등을 첨부</small>
            </span>
            <input id="photoInput" type="file" accept="image/*" multiple>
          </label>

          <div class="photo-preview" id="photoPreview" aria-label="선택한 사진 미리보기"></div>

          <div class="form-actions">
            <button class="primary-button" type="submit">저장하기</button>
            <button class="secondary-button" id="cancelEditButton" type="button" hidden>수정 취소</button>
          </div>
        </form>
      </section>

      <section class="panel calendar-panel" aria-labelledby="calendarTitle">
        <div class="panel-head list-head">
          <div>
            <p class="eyebrow">캘린더</p>
            <h2 id="calendarTitle">마감일 보기</h2>
          </div>
          <div class="calendar-controls" aria-label="달력 이동">
            <button class="ghost-button icon-button" id="prevMonthButton" type="button" aria-label="이전 달">‹</button>
            <strong id="monthLabel"></strong>
            <button class="ghost-button icon-button" id="nextMonthButton" type="button" aria-label="다음 달">›</button>
          </div>
        </div>

        <section class="week-panel" aria-labelledby="weekTitle">
          <div class="week-panel-head">
            <div>
              <p class="eyebrow">이번 주</p>
              <h2 id="weekTitle">이번 주 수행평가</h2>
            </div>
            <span class="week-range" id="weekRange"></span>
          </div>
          <div class="week-list" id="weekList"></div>
          <p class="week-empty" id="weekEmpty">이번 주에 수행평가가 없습니다.</p>
        </section>

        <div class="calendar-grid" id="calendarGrid" aria-label="수행평가 마감 캘린더"></div>

      </section>
    </main>
  </div>

  <dialog class="detail-dialog" id="detailDialog">
    <article class="detail-panel">
      <button class="close-button" id="closeDetailButton" type="button" aria-label="상세정보 닫기">×</button>
      <div class="detail-header">
        <span class="subject-chip" id="detailSubject"></span>
        <span class="photo-count" id="detailDday"></span>
      </div>
      <h2 id="detailTitle"></h2>
      <p class="detail-date" id="detailDate"></p>
      <section>
        <h3>세부내용</h3>
        <p class="detail-text" id="detailText"></p>
      </section>
      <section>
        <h3>첨부 사진</h3>
        <div class="detail-photos" id="detailPhotos"></div>
      </section>
      <div class="detail-actions">
        <button class="secondary-button danger-button" id="detailDeleteButton" type="button">삭제</button>
        <button class="secondary-button" id="detailEditButton" type="button">수정</button>
        <button class="secondary-button" id="detailDoneButton" type="button">완료</button>
      </div>
    </article>
  </dialog>

  <dialog class="photo-dialog" id="photoDialog">
    <article class="photo-viewer">
      <button class="close-button photo-close-button" id="closePhotoButton" type="button" aria-label="사진 크게 보기 닫기">×</button>
      <div class="photo-zoom-stage" id="photoZoomStage">
        <img id="largePhoto" src="" alt="">
      </div>
      <p id="largePhotoCaption"></p>
    </article>
  </dialog>

  <script src="script.js?v=deploy-ready"></script>
</body>
</html>
